<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — norisxgg store</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --blue: #0088ff; --bg: #f0f4f8; --card: #ffffff; --text: #1a202c; --muted: #718096; --border: #e2e8f0; --red: #e53e3e; --green: #38a169; }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0d1117; --card: #161b22; --text: #e6edf3; --muted: #8b949e; --border: #30363d; }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .card {
      background: var(--card); border-radius: 16px; padding: 40px;
      width: 100%; max-width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,.12);
    }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .logo-icon { width: 42px; height: 42px; background: var(--blue); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; }
    .logo h1 { font-size: 20px; font-weight: 800; }
    .logo span { font-size: 12px; color: var(--muted); }
    h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    p { color: var(--muted); font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 7px; }
    .input-wrap { position: relative; }
    input {
      width: 100%; padding: 12px 42px 12px 14px; border: 1.5px solid var(--border);
      border-radius: 10px; background: var(--bg); color: var(--text);
      font-size: 14px; outline: none; transition: border-color .2s;
    }
    input:focus { border-color: var(--blue); }
    .eye-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); font-size: 16px; }
    .strength { height: 4px; border-radius: 4px; margin-top: 6px; transition: all .3s; background: var(--border); }
    .strength.weak   { background: var(--red); width: 33%; }
    .strength.medium { background: #ed8936; width: 66%; }
    .strength.strong { background: var(--green); width: 100%; }
    .strength-label { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .btn {
      width: 100%; padding: 13px; background: var(--blue); color: white;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
      cursor: pointer; margin-top: 8px; transition: background .2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:hover { background: #0070d9; }
    .btn:disabled { background: var(--border); cursor: not-allowed; }
    .alert { padding: 12px 16px; border-radius: 10px; font-size: 13px; margin-bottom: 16px; display: none; align-items: center; gap: 8px; }
    .alert-error   { background: rgba(229,62,62,.1);  color: var(--red);   border: 1px solid rgba(229,62,62,.2); }
    .alert-success { background: rgba(56,161,105,.1); color: var(--green); border: 1px solid rgba(56,161,105,.2); }
    .back-link { text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted); }
    .back-link a { color: var(--blue); text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon"><i class="fas fa-gamepad"></i></div>
      <div>
        <h1>norisxgg</h1>
        <span>store</span>
      </div>
    </div>

    <h2>Reset Your Password</h2>
    <p>Enter a new password for your account. Make it strong and memorable.</p>

    <div class="alert alert-error" id="error-box"><i class="fas fa-exclamation-circle"></i><span id="error-msg"></span></div>
    <div class="alert alert-success" id="success-box"><i class="fas fa-check-circle"></i><span id="success-msg"></span></div>

    <div id="form-section">
      <div class="field">
        <label>New Password</label>
        <div class="input-wrap">
          <input type="password" id="new-pass" placeholder="At least 6 characters" oninput="checkStrength(this.value)">
          <button class="eye-btn" type="button" onclick="toggleVis('new-pass',this)"><i class="fas fa-eye"></i></button>
        </div>
        <div class="strength" id="strength-bar"></div>
        <div class="strength-label" id="strength-label"></div>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <div class="input-wrap">
          <input type="password" id="conf-pass" placeholder="Repeat your password">
          <button class="eye-btn" type="button" onclick="toggleVis('conf-pass',this)"><i class="fas fa-eye"></i></button>
        </div>
      </div>
      <button class="btn" id="submit-btn" onclick="resetPassword()">
        <i class="fas fa-key"></i> Reset Password
      </button>
    </div>

    <div class="back-link">
      <a href="/"><i class="fas fa-arrow-left"></i> Back to Store</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token');

    if (!token) {
      document.getElementById('error-box').style.display = 'flex';
      document.getElementById('error-msg').textContent = 'Invalid reset link. Please request a new one.';
      document.getElementById('form-section').style.display = 'none';
    }

    function checkStrength(pw) {
      const bar = document.getElementById('strength-bar');
      const lbl = document.getElementById('strength-label');
      if (!pw) { bar.className = 'strength'; lbl.textContent = ''; return; }
      const strong = /[A-Z]/.test(pw) && /[0-9]/.test(pw) && /[^A-Za-z0-9]/.test(pw) && pw.length >= 8;
      const medium = pw.length >= 6;
      bar.className = 'strength ' + (strong ? 'strong' : medium ? 'medium' : 'weak');
      lbl.textContent = strong ? '✓ Strong password' : medium ? 'Medium — add numbers & symbols' : 'Weak — too short';
      lbl.style.color = strong ? '#38a169' : medium ? '#ed8936' : '#e53e3e';
    }

    function toggleVis(id, btn) {
      const input = document.getElementById(id);
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      btn.innerHTML = isHidden ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
    }

    async function resetPassword() {
      const pass = document.getElementById('new-pass').value;
      const conf = document.getElementById('conf-pass').value;
      const btn  = document.getElementById('submit-btn');
      const errBox = document.getElementById('error-box');
      const sucBox = document.getElementById('success-box');

      errBox.style.display = 'none';
      sucBox.style.display = 'none';

      if (pass.length < 6) {
        document.getElementById('error-msg').textContent = 'Password must be at least 6 characters.';
        errBox.style.display = 'flex'; return;
      }
      if (pass !== conf) {
        document.getElementById('error-msg').textContent = 'Passwords do not match.';
        errBox.style.display = 'flex'; return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting...';

      try {
        const res  = await fetch(`/api/auth/reset-password/${token}`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ password: pass })
        });
        const data = await res.json();

        if (!res.ok) {
          document.getElementById('error-msg').textContent = data.message;
          errBox.style.display = 'flex';
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-key"></i> Reset Password';
          return;
        }

        document.getElementById('success-msg').textContent = 'Password reset successfully! Redirecting to store...';
        sucBox.style.display = 'flex';
        document.getElementById('form-section').style.display = 'none';

        // Save token and redirect
        localStorage.setItem('norisxgg_token', data.token);
        setTimeout(() => window.location.href = '/', 2500);
      } catch {
        document.getElementById('error-msg').textContent = 'Something went wrong. Please try again.';
        errBox.style.display = 'flex';
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-key"></i> Reset Password';
      }
    }
  </script>
</body>
</html>
